# ============================================================================
# Buddy Script — Development Docker Compose
# Usage: docker compose -f docker-compose.dev.yml up
#
# - Live reload on file changes (volumes mount source code)
# - Logs visible in terminal
# - No build step needed for code changes
# ============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: buddy-script-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buddy-script-network

  redis:
    image: redis:7-alpine
    container_name: buddy-script-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buddy-script-network

  minio:
    image: minio/minio:latest
    container_name: buddy-script-minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - buddy-script-network

  minio-init:
    image: minio/mc:latest
    container_name: buddy-script-minio-init
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$S3_ACCESS_KEY $$S3_SECRET_KEY &&
      mc mb -p local/$$S3_BUCKET || true &&
      mc anonymous set download local/$$S3_BUCKET || true;
      "
    networks:
      - buddy-script-network

  server:
    image: oven/bun:1
    container_name: buddy-script-server
    working_dir: /app
    command: sh -c "bun install && bunx prisma generate && bun --watch src/server.ts"
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - buddy-script-network

  client:
    image: oven/bun:1
    container_name: buddy-script-client
    working_dir: /app
    command: sh -c "bun install && bun run dev"
    env_file:
      - ./client/.env
    environment:
      NEXT_PUBLIC_API_URL: http://server:5000
    volumes:
      - ./client:/app
    ports:
      - "3000:3000"
    depends_on:
      - server
    networks:
      - buddy-script-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  buddy-script-network:
    driver: bridge
