openapi: 3.0.3
info:
  title: Buddy-Script API
  description: Social media feed application API
  version: 1.0.0

servers:
  - url: http://localhost:3000/api/v1
    description: Local development

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Posts
    description: Post CRUD and feed
  - name: Comments
    description: Comment CRUD per post
  - name: Replies
    description: Reply CRUD per comment
  - name: Likes
    description: Like/unlike posts, comments, replies
  - name: Shares
    description: Share posts and view who shared

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        emailVerified:
          type: boolean
        status:
          type: string
          enum: [ACTIVE, BLOCKED, DELETED]
        image:
          type: string
          nullable: true
        isDeleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserSummary:
      type: object
      properties:
        id:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        image:
          type: string
          nullable: true

    Post:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        image:
          type: string
          nullable: true
        visibility:
          type: string
          enum: [PUBLIC, PRIVATE]
        isDeleted:
          type: boolean
        shareCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        author:
          $ref: "#/components/schemas/UserSummary"
        _count:
          type: object
          properties:
            likes:
              type: integer
            comments:
              type: integer
            shares:
              type: integer
        likes:
          type: array
          description: Current user's like (empty if not liked)
          items:
            type: object
            properties:
              id:
                type: string

    Comment:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        isDeleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        postId:
          type: string
        author:
          $ref: "#/components/schemas/UserSummary"
        _count:
          type: object
          properties:
            likes:
              type: integer
            replies:
              type: integer
        likes:
          type: array
          items:
            type: object
            properties:
              id:
                type: string

    Reply:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        isDeleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        commentId:
          type: string
        author:
          $ref: "#/components/schemas/UserSummary"
        _count:
          type: object
          properties:
            likes:
              type: integer
        likes:
          type: array
          items:
            type: object
            properties:
              id:
                type: string

    Like:
      type: object
      properties:
        id:
          type: string
        likeableType:
          type: string
          enum: [POST, COMMENT, REPLY]
        createdAt:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/UserSummary"

    Share:
      type: object
      properties:
        id:
          type: string
        createdAt:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/UserSummary"

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: object
          nullable: true

paths:
  # ── Auth ──────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [firstName, lastName, email, password]
              properties:
                firstName:
                  type: string
                  minLength: 1
                lastName:
                  type: string
                  minLength: 1
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/User"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/User"

  # ── Posts ─────────────────────────────────────────
  /posts:
    get:
      tags: [Posts]
      summary: Get feed (newest first)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Feed fetched
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Post"

    post:
      tags: [Posts]
      summary: Create a post
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
                image:
                  type: string
                visibility:
                  type: string
                  enum: [PUBLIC, PRIVATE]
                  default: PUBLIC
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/Post"

  /posts/{id}:
    get:
      tags: [Posts]
      summary: Get a single post
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post fetched
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/Post"

    patch:
      tags: [Posts]
      summary: Update a post (author only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                  minLength: 1
                image:
                  type: string
                  nullable: true
                visibility:
                  type: string
                  enum: [PUBLIC, PRIVATE]
      responses:
        "200":
          description: Post updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/Post"

    delete:
      tags: [Posts]
      summary: Soft delete a post (author only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Post deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── Comments ──────────────────────────────────────
  /comments/post/{postId}:
    get:
      tags: [Comments]
      summary: Get comments for a post
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comments fetched
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Comment"

    post:
      tags: [Comments]
      summary: Add a comment to a post
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
      responses:
        "201":
          description: Comment created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/Comment"

  /comments/{id}:
    patch:
      tags: [Comments]
      summary: Update a comment (author only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: Comment updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/Comment"

    delete:
      tags: [Comments]
      summary: Soft delete a comment (author only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comment deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── Replies ───────────────────────────────────────
  /replies/comment/{commentId}:
    get:
      tags: [Replies]
      summary: Get replies for a comment
      security:
        - bearerAuth: []
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Replies fetched
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Reply"

    post:
      tags: [Replies]
      summary: Add a reply to a comment
      security:
        - bearerAuth: []
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
      responses:
        "201":
          description: Reply created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/Reply"

  /replies/{id}:
    patch:
      tags: [Replies]
      summary: Update a reply (author only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: Reply updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        $ref: "#/components/schemas/Reply"

    delete:
      tags: [Replies]
      summary: Soft delete a reply (author only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reply deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ── Likes ─────────────────────────────────────────
  /likes/post/{postId}:
    post:
      tags: [Likes]
      summary: Toggle like on a post
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Like toggled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        type: object
                        properties:
                          liked:
                            type: boolean

  /likes/comment/{commentId}:
    post:
      tags: [Likes]
      summary: Toggle like on a comment
      security:
        - bearerAuth: []
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Like toggled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        type: object
                        properties:
                          liked:
                            type: boolean

  /likes/reply/{replyId}:
    post:
      tags: [Likes]
      summary: Toggle like on a reply
      security:
        - bearerAuth: []
      parameters:
        - name: replyId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Like toggled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        type: object
                        properties:
                          liked:
                            type: boolean

  /likes/{type}/{id}:
    get:
      tags: [Likes]
      summary: Get users who liked a post/comment/reply
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [post, comment, reply]
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Likes fetched
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Like"

  # ── Shares ────────────────────────────────────────
  /shares/{postId}:
    post:
      tags: [Shares]
      summary: Share a post
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Post shared
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        type: object
                        properties:
                          alreadyShared:
                            type: boolean

    get:
      tags: [Shares]
      summary: Get users who shared a post
      security:
        - bearerAuth: []
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shares fetched
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Share"
